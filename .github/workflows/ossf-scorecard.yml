name: OpenSSF Scorecard
on:
    push:
        branches: [main]
    schedule:
        - cron: '30 4 * * 1'
    workflow_dispatch:

permissions: read-all

jobs:
    scorecard:
        uses: platform-mesh/.github/.github/workflows/job-ossf-scorecard.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
