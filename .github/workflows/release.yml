name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@5ead9a254c5111eefda00a54d41ccf55e2986105

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    secrets: inherit
    with:
      coverageThresholdFile: 0
      coverageThresholdPackage: 0
      coverageThresholdTotal: 0

  create-version:
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    secrets: inherit

  docker-build-push:
    needs: [create-version, lint, test]
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    with:
      imageTagName: ghcr.io/platform-mesh/virtual-workspaces
      version: ${{ needs.create-version.outputs.version }}
      multiarch: true
    secrets: inherit

  update-version:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-chart-version-update.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    secrets: inherit
    with:
      appVersion: ${{ needs.create-version.outputs.version }}
      chart: virtual-workspaces
      targetRepository: platform-mesh/helm-charts

  sbom:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-sbom.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    with:
      imageReference: ghcr.io/platform-mesh/virtual-workspaces:${{ needs.create-version.outputs.version }}

  image-ocm:
    needs: [create-version, docker-build-push, sbom]
    uses: platform-mesh/.github/.github/workflows/job-image-ocm.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    secrets: inherit
    with:
      imageReference: ghcr.io/platform-mesh/virtual-workspaces:${{ needs.create-version.outputs.version }}
      appVersion: ${{ needs.create-version.outputs.version }}
      repoName: virtual-workspaces
      commit: ${{ github.sha }}
