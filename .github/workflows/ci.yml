name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@5ead9a254c5111eefda00a54d41ccf55e2986105

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    with:
      coverageThresholdFile: 0
      coverageThresholdPackage: 0
      coverageThresholdTotal: 0

  docker-build:
    uses: platform-mesh/.github/.github/workflows/job-docker-build.yml@5ead9a254c5111eefda00a54d41ccf55e2986105
    with:
      imageTagName: ghcr.io/platform-mesh/virtual-workspaces

  quality-gate:
    if: always()
    permissions: {}
    needs: [lint, test, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"
            exit 1
          fi
          if [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "docker-build failed"
            exit 1
          fi
